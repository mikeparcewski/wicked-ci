name: Reusable Node Release

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
        description: 'Unscoped package name, e.g. "wicked-bus"'
      scope:
        type: string
        default: '@mikeparcewski'
        description: 'GitHub Packages scope (used for the @scope/name rename)'
      version_dirs:
        type: string
        default: '.'
        description: 'Newline-separated dirs where `npm version` should run (e.g. "." plus a nested package)'
      pre_publish_install_dirs:
        type: string
        default: ''
        description: 'Newline-separated dirs to run `npm install --omit=dev` in before publish (for nested packages whose deps the tarball or prepublishOnly hook requires)'
      test_working_dir:
        type: string
        default: '.'
      install_cmd:
        type: string
        default: 'npm install'
      test_cmd:
        type: string
        default: 'npm test'
      node_version:
        type: string
        default: 'lts/*'
      os_matrix:
        type: string
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        description: 'JSON array of runners for the pre-publish test matrix (narrow to e.g. ["ubuntu-latest"] for bash/python gates that do not run on Windows)'
      setup_python:
        type: boolean
        default: false
        description: 'Also set up Python in the test job (for repos whose tests are pytest/bash, e.g. wicked-loom, wicked-vault)'
      python_version:
        type: string
        default: '3.12'
        description: 'Python version when setup_python is true'
      enable_sync_pr:
        type: boolean
        default: false
        description: 'After publish, open a catchup PR that bumps package.json on main to the released version'
      enable_github_packages:
        type: boolean
        default: true
        description: 'Mirror the publish to GitHub Packages under <scope>/<package_name>'
      publish_working_dir:
        type: string
        default: '.'
        description: 'Directory to run `npm publish` from. Default "." (single-package-at-root repo). Set to the publishable package dir for a workspace whose root is private (e.g. "packages/crew").'
      use_npm_token:
        type: boolean
        default: false
        description: 'Publish with an NPM_TOKEN secret (NODE_AUTH_TOKEN) instead of tokenless OIDC trusted publishing. For repos publishing brand-new package names where a trusted publisher cannot be pre-registered. Caller must pass `secrets: inherit` and define an NPM_TOKEN secret. Default false keeps every existing caller on OIDC.'
      build_cmd:
        type: string
        default: ''
        description: 'Command run at repo root before publish to compile the package (e.g. "npm install && npm run -w packages/crew build") when its dist/ is gitignored and not committed. Runs with full dev deps. Empty = no build (default; unchanged for existing callers).'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
      - if: inputs.setup_python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install
        working-directory: ${{ inputs.test_working_dir }}
        run: ${{ inputs.install_cmd }}
      - name: Test
        working-directory: ${{ inputs.test_working_dir }}
        run: ${{ inputs.test_cmd }}

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        env:
          VERSION_DIRS: ${{ inputs.version_dirs }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            (cd "$dir" && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done <<< "$VERSION_DIRS"

      - name: Pre-publish install
        if: inputs.pre_publish_install_dirs != ''
        env:
          PRE_DIRS: ${{ inputs.pre_publish_install_dirs }}
        run: |
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            (cd "$dir" && npm install --omit=dev)
          done <<< "$PRE_DIRS"

      - name: Build (compile before publish; for packages whose dist/ isn't committed)
        if: inputs.build_cmd != ''
        run: ${{ inputs.build_cmd }}

      # Default path — tokenless OIDC trusted publishing. Byte-identical to before for every
      # existing caller (use_npm_token defaults false), so their releases are unaffected.
      - name: Publish to npm (trusted publisher + provenance)
        if: ${{ !inputs.use_npm_token }}
        working-directory: ${{ inputs.publish_working_dir }}
        run: npm publish --access public --provenance

      # Opt-in path — NPM_TOKEN auth, for brand-new package names that have no pre-registered
      # trusted publisher. --provenance still attaches an OIDC build-provenance attestation
      # (needs id-token: write, already granted by the caller).
      - name: Publish to npm (NPM_TOKEN + provenance)
        if: ${{ inputs.use_npm_token }}
        working-directory: ${{ inputs.publish_working_dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  publish-github-packages:
    # Ordering invariant: GitHub Packages must NEVER publish unless npm publish
    # already succeeded. npm is the source of truth; mirroring to GH Packages
    # first would leave a half-released version if npm publish then failed.
    # Therefore: needs publish-npm (sequencing) AND gate on its success below.
    needs: [test, publish-npm]
    if: inputs.enable_github_packages && needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: https://npm.pkg.github.com
          scope: ${{ inputs.scope }}

      - name: Set version from tag
        env:
          VERSION_DIRS: ${{ inputs.version_dirs }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            (cd "$dir" && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done <<< "$VERSION_DIRS"

      - name: Pre-publish install
        if: inputs.pre_publish_install_dirs != ''
        env:
          PRE_DIRS: ${{ inputs.pre_publish_install_dirs }}
        run: |
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            (cd "$dir" && npm install --omit=dev)
          done <<< "$PRE_DIRS"

      - name: Build (compile before publish; for packages whose dist/ isn't committed)
        if: inputs.build_cmd != ''
        run: ${{ inputs.build_cmd }}

      - name: Publish to GitHub Packages
        working-directory: ${{ inputs.publish_working_dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_FQN: ${{ inputs.scope }}/${{ inputs.package_name }}
        run: |
          npm pkg set name="$PACKAGE_FQN"
          npm publish --access public

  github-release:
    needs: publish-npm
    if: needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-package-json:
    needs: publish-npm
    if: inputs.enable_sync_pr && needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Bump package.json files to released version
        env:
          VERSION_DIRS: ${{ inputs.version_dirs }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            (cd "$dir" && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done <<< "$VERSION_DIRS"

      - name: Open catchup PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: release-sync/${{ github.ref_name }}
          delete-branch: true
          commit-message: "chore(release): sync package.json to ${{ github.ref_name }} [skip ci]"
          title: "chore(release): sync package.json to ${{ github.ref_name }}"
          labels: release-sync
          body: |
            Automated catchup — `${{ github.ref_name }}` has been published.
            This PR brings package.json on `main` in step with the released
            version. Safe to squash-merge.
