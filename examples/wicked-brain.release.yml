name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  release:
    uses: mikeparcewski/wicked-ci/.github/workflows/node-release.yml@v1
    with:
      package_name: wicked-brain
      test_working_dir: server
      version_dirs: |
        .
        server
      pre_publish_install_dirs: |
        .
        server
      enable_sync_pr: true
    secrets: inherit
